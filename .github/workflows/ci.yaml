name: CI Pipeline (Sonar + Snyk + Email)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
# -------------------------------
# 1. SONAR SCAN + TEST
# -------------------------------
  sonarscan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Run Tests and Generate Coverage
        run: npm test

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://13.232.131.129:9000/
        with:
          args: >
            -Dsonar.projectKey=notification-service-pipelines
            -Dsonar.sources=.

      - name: Sonar Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://13.232.131.129:9000/

  sonarnotification:
    name: Email Notification
    needs: [sonarscan, snykscan]
    runs-on: ubuntu-latest

    steps:
      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ❌ CI Pipeline Failed
          body: |
            SonarScan FAILED for commit: "${{ github.event.head_commit.message }}"
            Repo: ${{ github.repository }}
            Pipeline Status: ${{ job.status }}
            Check GitHub Actions for logs.
          to: ${{ secrets.RECIVER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}

# -------------------------------
# 2. SNYK SCAN
# -------------------------------
  snykscan:
    name: Snyk Scan
    needs: [sonarscan]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --ignore-scripts

      - name: Snyk Test
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  snyknotification:
    name: Email Notification
    needs: [sonarscan, snykscan]
    runs-on: ubuntu-latest

    steps:
      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ❌ CI Pipeline Failed
          body: |
            SnykScan FAILED for commit: "${{ github.event.head_commit.message }}"
            Repo: ${{ github.repository }}
            Pipeline Status: ${{ job.status }}
            Check GitHub Actions for logs.
          to: ${{ secrets.RECIVER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
