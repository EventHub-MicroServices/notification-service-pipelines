name: CI Pipeline (Sonar + Snyk + Docker + Trivy)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: notification-service
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
# -------------------------------
# 1. SONAR SCAN + TEST
# -------------------------------
  sonarscan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Run Tests and Generate Coverage
        run: npm test

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=notification-service-pipelines
            -Dsonar.organization=muhammedsinanust
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,coverage/**,**/*.test.js
            -Dsonar.coverage.exclusions=server.js
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.host.url=https://sonarcloud.io

      - name: Sonar Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# -------------------------------
# 2. SNYK SCAN
# -------------------------------
  snykscan:
    name: Snyk Scan
    needs: sonarscan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --ignore-scripts

      - name: Snyk Test
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

# -------------------------------
# 3. BUILD + DOCKER + TRIVY
# -------------------------------
  build-and-scan:
    name: Build Image & Scan
    needs: snykscan
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set Image Tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build -t $DOCKERHUB_USERNAME/$IMAGE_NAME:${{ steps.meta.outputs.tag }} .

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy Image Scan
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 0 \
          $DOCKERHUB_USERNAME/$IMAGE_NAME:${{ steps.meta.outputs.tag }}

# -------------------------------
# 4. PUSH TO DOCKER HUB
# -------------------------------
  push-image:
    name: Push Docker Image
    needs: build-and-scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u $DOCKERHUB_USERNAME --password-stdin

      - name: Push Image
        run: |
          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:${{ needs.build-and-scan.outputs.image_tag }}

# -------------------------------
# 5. EMAIL NOTIFICATION
# -------------------------------
  mailnotification:
    name: Email Notification
    needs: [sonarscan, snykscan, build-and-scan, push-image]
    runs-on: ubuntu-latest

    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: CI Pipeline Status - ${{ job.status }}
          body: |
            Pipeline Status: ${{ job.status }}
            Repository: ${{ github.repository }}
            Commit: ${{ github.event.head_commit.message }}

            Image Tag: ${{ needs.build-and-scan.outputs.image_tag }}

            Check details in GitHub Actions.
          to: ${{ secrets.RECIVER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}