name: Build & Push Docker Image

on:
  workflow_run:
    workflows: ["CI Pipeline (Sonar + Snyk + Email)"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for Docker image'
        required: true

env:
  IMAGE_NAME: notification-service
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    name: Build Image & Scan
    runs-on: ubuntu-latest

    steps:
      - name: Validate Tag Format
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "❌ Invalid tag format. Use v1.2.3"
          exit 1
          fi

      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t $DOCKERHUB_USERNAME/$IMAGE_NAME:${{ github.event.inputs.tag }} .
          docker tag $DOCKERHUB_USERNAME/$IMAGE_NAME:${{ github.event.inputs.tag }} $DOCKERHUB_USERNAME/$IMAGE_NAME:latest
      
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}'
          format: 'table'
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image
        run: |
          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:${{ github.event.inputs.tag }}
          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:latest

# -------------------------------
# 5. EMAIL NOTIFICATION
# -------------------------------
  mailnotification:
    name: Email Notification
    needs: [build-and-push]
    runs-on: ubuntu-latest

    steps:
      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ❌ CI Pipeline Failed
          body: |
            Trivy Scan FAILED for commit: "${{ github.event.head_commit.message }}"
            Repo: ${{ github.repository }}
            Pipeline Status: ${{ job.status }}
            Check GitHub Actions for logs.
          to: ${{ secrets.RECIVER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}

      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ✅ CI Pipeline Success
          body: |
            Pipeline SUCCESS for commit: "${{ github.event.head_commit.message }}"
            Docker Image: '${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}'
            Pipeline Status: ${{ job.status }}
            Check details in GitHub Actions.
          to: ${{ secrets.RECIVER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          
          